input_path: data/input/candidates.jsonl
output_dir: data/output
batch_size: 1000
progress_every: 10000
memory_safe_mode: true
max_text_length_per_candidate: 12000
enable_debug_samples: true

ranking:
  top_k: 100
  strict_rerank_pool_size: 300
  max_evidence_snippets: 5
  score_weights:
    jd_relevance: 0.25
    must_have_skill: 0.20
    proof_alignment: 0.25
    retrieval_evaluation_depth: 0.10
    production_readiness: 0.10
    hireability: 0.10
  penalties:
    empty_profile_text: 0.15
    extremely_high_keyword_density: 0.10
    missing_skills: 0.05
    missing_experience: 0.05

honeypot_firewall:
  enabled: false
  strict_top_n: 10
  risk_rerank_pool_size: 500
  disqualify_severe: true
  max_risk_penalty: 0.50
  risk_thresholds:
    low: 0.24
    medium: 0.49
    high: 0.74
    severe: 1.00
  penalties:
    zero_duration_expert_claim: 0.25
    expert_claim_without_tenure: 0.20
    excessive_keyword_density: 0.15
    buzzword_stuffing: 0.15
    many_claimed_skills_weak_evidence: 0.18
    unsupported_required_skill: 0.20
    weak_proof_alignment: 0.15
    seniority_evidence_mismatch: 0.15
    title_skill_mismatch: 0.12
    research_only_for_production_jd: 0.08
    missing_availability_signals: 0.03
    empty_profile_text: 0.50

evidence_calibration:
  enabled: false
  calibration_pool_size: 700
  max_calibration_bonus: 0.08
  max_calibration_penalty: 0.15
  top10_strictness: 0.75
  neutral_hireability_score: 0.50
  weights:
    evidence_confidence: 0.30
    career_depth: 0.15
    jd_constraint_match: 0.25
    hireability: 0.10
    top10_readiness: 0.20
  negative_constraint_penalties:
    research_only_without_production: 0.05
    service_only_without_ai_depth: 0.05
    keyword_only_without_evidence: 0.10
    no_retrieval_or_ranking_evidence: 0.08
    no_evaluation_evidence: 0.06
    no_production_evidence: 0.06
    missing_must_have_skill: 0.10

ablation:
  enabled: false
  top_k: 100
  compare_variants:
    - keyword_only
    - baseline_feature2
    - baseline_plus_firewall
    - baseline_plus_firewall_plus_calibration

submission_safety:
  min_reasoning_chars: 40
  max_top10_severe_risk: 0
  warn_if_all_scores_within: 0.02
  require_score_descending: true

reproducibility:
  random_seed: 42
  repository_url: "https://github.com/bpranav371-ship-it/Evidence_Rank.git"
  recommended_final_command: "python run.py --jd data/input/job_description.txt --rank --top-k 100 --enable-honeypot-firewall --enable-evidence-calibration"

benchmark:
  enabled: false
  min_pass_rate: 0.75

weight_sensitivity:
  enabled: false
  variants:
    - default
    - proof_heavy
    - production_heavy
    - retrieval_eval_heavy
    - hireability_light
    - firewall_strict
    - calibration_light
    - keyword_baseline_reference

runtime_profile:
  enabled: false
  warn_if_projected_ranking_seconds_above: 300

submission_package:
  include_optional_reports: true
  package_name: "submission_package.zip"
  require_ranked_candidates: true
  require_score_breakdown: true
  require_safety_report: true

demo_materials:
  top_n_explanations: 10
  deck_slide_count: 12
  include_speaker_notes: true
  project_title: "EvidenceRank — Candidate Proof Engine"
  hackathon_track: "INDIA RUNS Track 1"
  demo_packet_name: "demo_packet.zip"
  diagrams:
    generate_mermaid: true

judge_demo:
  require_ranked_candidates: true
  require_score_breakdown: true
  require_safety_report: true
  require_reproducibility_manifest: true
